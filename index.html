<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud Certificado de Residencia - Caucasia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <manifest rel="manifest" href="manifest.json">
    <style>
        body { background-color: #f3f4f6; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto bg-gray-50 min-h-screen flex flex-col justify-between">

    <header class="bg-green-700 text-white p-4 rounded-xl shadow-md text-center mb-6">
        <h1 class="text-xl font-bold uppercase tracking-wide">Certificado de Residencia</h1>
        <p class="text-xs opacity-90 mt-1">Secretaría de Gobierno - Alcaldía de Caucasia</p>
    </header>

    <main class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 space-y-4 flex-grow">
        <form id="residenciaForm" class="space-y-4">
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nombre Completo</label>
                <input type="text" id="nombre" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-600 focus:outline-none" placeholder="Ej. Juan Pérez">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Tipo y Número de Documento</label>
                <input type="text" id="documento" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-600 focus:outline-none" placeholder="Ej. C.C. 1.000.000">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Dirección de Residencia</label>
                <input type="text" id="direccion" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-600 focus:outline-none" placeholder="Ej. Barrio Centro Calle 20 #10-10">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Teléfono / WhatsApp de Contacto</label>
                <input type="tel" id="telefono" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-600 focus:outline-none" placeholder="Ej. 3101234567">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Propósito del Certificado</label>
                <select id="proposito" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-600 focus:outline-none">
                    <option value="Trámites Laborales">Trámites Laborales</option>
                    <option value="Fines Educativos">Fines Educativos</option>
                    <option value="Subsidios de Gobierno">Subsidios de Gobierno</option>
                    <option value="Otros">Otros</option>
                </select>
            </div>

            <div class="bg-blue-50 p-3.5 rounded-lg border border-blue-200">
                <span class="block text-xs font-bold text-blue-800 uppercase tracking-wider mb-2">Validación de Ubicación</span>
                <button type="button" onclick="obtenerUbicacion()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 px-4 rounded-md transition duration-200 flex items-center justify-center gap-2">
                    📍 Capturar Mi Geolocalización
                </button>
                <div id="statusUbicacion" class="text-xs text-gray-600 mt-2 text-center font-medium italic">
                    Ubicación no capturada aún (Requerido)
                </div>
            </div>

            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg shadow transition duration-200 uppercase tracking-wide text-sm mt-4">
                Enviar Datos por WhatsApp
            </button>
        </form>
    </main>

    <footer class="mt-6 text-center text-xs text-gray-500 py-3 border-t border-gray-200">
        <p class="font-semibold text-gray-700">Hecha por VIBRAS POSITIVAS HM</p>
        <p>&copy; 2026 Todos los derechos reservados</p>
    </footer>

    <script>
        let coordenadasGlobales = "";

        // Función para obtener la Geolocalización
        function obtenerUbicacion() {
            const status = document.getElementById("statusUbicacion");
            
            if (!navigator.geolocation) {
                status.innerText = "La geolocalización no es compatible con tu navegador.";
                status.className = "text-xs text-red-600 mt-2 text-center font-medium";
                return;
            }

            status.innerText = "Localizando...";
            status.className = "text-xs text-amber-600 mt-2 text-center font-medium animate-pulse";

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    coordenadasGlobales = `https://www.google.com/maps?q=${lat},${lon}`;
                    
                    status.innerHTML = `✅ ¡Ubicación verificada con éxito!<br><span class="text-[10px] text-gray-500">Lat: ${lat.toFixed(5)}, Lon: ${lon.toFixed(5)}</span>`;
                    status.className = "text-xs text-green-700 mt-2 text-center font-semibold";
                },
                () => {
                    status.innerText = "❌ Error al obtener la ubicación. Por favor, activa el GPS.";
                    status.className = "text-xs text-red-600 mt-2 text-center font-medium";
                }
            );
        }

        // Manejo del envío del formulario
        document.getElementById("residenciaForm").addEventListener("submit", function(e) {
            e.preventDefault();

            if (!coordenadasGlobales) {
                alert("Por favor, capture su geolocalización antes de enviar el formato. Es un requisito obligatorio.");
                return;
            }

            // Captura de datos
            const nombre = document.getElementById("nombre").value;
            const documento = document.getElementById("documento").value;
            const direccion = document.getElementById("direccion").value;
            const telefono = document.getElementById("telefono").value;
            const proposito = document.getElementById("proposito").value;

            // Construcción del mensaje para WhatsApp
            const mensaje = `*SOLICITUD CERTIFICADO DE RESIDENCIA*%0A` +
                            `*Alcaldía de Caucasia*%0A%0A` +
                            `• *Nombre:* ${nombre}%0A` +
                            `• *Documento:* ${documento}%0A` +
                            `• *Dirección:* ${direccion}%0A` +
                            `• *Teléfono:* ${telefono}%0A` +
                            `• *Propósito:* ${proposito}%0A%0A` +
                            `📍 *Geolocalización del Solicitante:*%0A${coordenadasGlobales}%0A%0A` +
                            `_Enviado desde la App Oficial de VIBRAS POSITIVAS HM_`;

            // Número destino de ejemplo (se puede cambiar al de radicación de la alcaldía)
            const numeroDestino = "573100000000"; 
            
            // Abrir WhatsApp
            window.open(`https://api.whatsapp.com/send?phone=${numeroDestino}&text=${mensaje}`, '_blank');
        });

        // Registro del Service Worker para PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado con éxito', reg))
                    .catch(err => console.error('Error al registrar el Service Worker', err));
            });
        }
    </script>
</body>
</html>
